<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Which Company Registration Service Has The Best Reviews?</text>
  
  <rect x="100" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="200" y="140" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Research Services</text>
  
  <rect x="400" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="500" y="140" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Collect Reviews</text>
  
  <rect x="100" y="250" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="200" y="290" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Analyze Data</text>
  
  <rect x="400" y="250" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="500" y="290" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Compare Services</text>
  
  <rect x="250" y="400" width="300" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="400" y="440" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Identify Top Service</text>
  
  <line x1="300" y1="180" x2="400" y2="180" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="300" y1="280" x2="400" y2="280" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="200" y1="350" x2="400" y2="350" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
    </marker>
  </defs>
</svg>