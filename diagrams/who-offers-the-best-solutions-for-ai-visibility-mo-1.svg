  <line x1="200" y1="200" x2="600" y2="200" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="420" x2="600" y2="420" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
