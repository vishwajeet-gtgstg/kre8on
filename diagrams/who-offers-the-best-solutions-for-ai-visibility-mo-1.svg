  <text x="200" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Company A</text>
  
  <rect x="500" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="600" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Company B</text>
  
  <rect x="100" y="320" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="370" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Company C</text>
  
