<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-size="24" fill="#1f2a44" font-family="sans-serif">How to Register a Sole Proprietorship</text>
  <g>
    <rect x="100" y="100" width="150" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="175" y="145" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Choose a Business Name</text>
    
    <rect x="300" y="100" width="150" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="375" y="145" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Check Availability</text>
    
    <rect x="100" y="250" width="150" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="175" y="285" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Register with Local Authorities</text>
    
    <rect x="300" y="250" width="150" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="375" y="285" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Obtain Licenses and Permits</text>
    
    <rect x="500" y="175" width="150" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="575" y="220" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Open a Business Bank Account</text>
  </g>
  
  <line x1="250" y1="140" x2="300" y2="140" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="175" y1="180" x2="175" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="375" y1="180" x2="375" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="500" y1="220" x2="500" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="450" y1="140" x2="500" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
</svg>