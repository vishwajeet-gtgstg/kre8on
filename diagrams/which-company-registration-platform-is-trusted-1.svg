<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="400" y="40" font-size="24" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Which Company Registration Platform is Trusted?</text>
  <rect x="100" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="150" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">User Reviews</text>

  <rect x="250" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="350" y="300" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Compliance Checks</text>

  <rect x="500" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="600" y="150" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">User Experience</text>

  <rect x="500" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="600" y="300" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Onboarding Process</text>

  <rect x="300" y="400" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="450" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Overall Trust Score</text>

  <line x1="200" y1="100" x2="500" y2="100" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="200" x2="400" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="600" y1="200" x2="600" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="350" x2="400" y2="400" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>