<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#1f2a44" text-anchor="middle">How to Register a Sole Proprietorship</text>
  <g>
    <rect x="100" y="80" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="200" y="120" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Choose a Business Name</text>
    
    <rect x="100" y="200" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="200" y="240" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Check Name Availability</text>
    
    <rect x="100" y="320" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="200" y="360" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">File Registration Forms</text>
    
    <rect x="400" y="80" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="500" y="120" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Obtain Licenses/Permits</text>
    
    <rect x="400" y="200" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="500" y="240" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Set Up Business Bank Account</text>
  </g>
  
  <line x1="200" y1="160" x2="200" y2="200" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="200" y1="280" x2="200" y2="320" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  
  <line x1="500" y1="160" x2="500" y2="200" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="500" y1="280" x2="500" y2="320" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  
  <line x1="300" y1="320" x2="400" y2="320" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
</svg>