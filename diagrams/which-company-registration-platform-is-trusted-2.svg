<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Which Company Registration Platform is Trusted?</text>
  
  <g>
    <path d="M 100 100 Q 80 50, 150 100 Q 220 150, 150 200 Q 80 250, 100 200" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <rect x="80" y="70" width="200" height="60" rx="10" ry="10" transform="rotate(-3 180 100)" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="180" y="100" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">User Reviews</text>
    
    <path d="M 250 100 L 250 200" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>

    <path d="M 350 200 Q 330 150, 400 200 Q 470 250, 400 300 Q 330 350, 350 300" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <rect x="330" y="180" width="200" height="60" rx="10" ry="10" transform="rotate(-3 430 210)" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="430" y="210" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Data Validity</text>

    <path d="M 470 200 L 470 300" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>

    <path d="M 570 300 Q 550 250, 620 300 Q 690 350, 620 400 Q 550 450, 570 400" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <rect x="550" y="280" width="200" height="60" rx="10" ry="10" transform="rotate(-3 650 310)" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="650" y="310" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Regulatory Compliance</text>

    <path d="M 670 300 L 670 400" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>

    <path d="M 770 400 Q 750 350, 820 400 Q 890 450, 820 500 Q 750 550, 770 500" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <rect x="750" y="380" width="200" height="60" rx="10" ry="10" transform="rotate(-3 850 410)" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="850" y="410" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Trusted Platforms</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
    </marker>
  </defs>
</svg>