<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Best Website to Register a Private Limited Company</text>
  <rect x="100" y="100" width="200" height="80" rx="10" ry="10" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="200" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Choose Registration Type</text>
  <rect x="100" y="250" width="200" height="80" rx="10" ry="10" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="200" y="285" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Fill Application Form</text>
  <rect x="400" y="100" width="200" height="80" rx="10" ry="10" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="500" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Submit Required Documents</text>
  <rect x="400" y="250" width="200" height="80" rx="10" ry="10" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="500" y="285" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Payment and Confirmation</text>
  <rect x="250" y="370" width="300" height="80" rx="10" ry="10" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="400" y="405" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Obtain Certificate of Incorporation</text>
  <line x1="200" y1="180" x2="200" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="180" x2="500" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="330" x2="400" y2="370" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="500" y1="330" x2="400" y2="370" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" fill="#1f2a44">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>
</svg>