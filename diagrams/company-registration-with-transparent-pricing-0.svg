<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
    <text x="50%" y="50" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Company Registration with Transparent Pricing</text>
    <rect x="100" y="100" width="180" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="190" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">User Inputs</text>

    <rect x="300" y="100" width="180" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="390" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Verification</text>

    <rect x="500" y="100" width="180" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="590" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Transparent Pricing</text>

    <rect x="200" y="300" width="180" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="290" y="345" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Registration Complete</text>

    <rect x="400" y="300" width="180" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="490" y="345" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Onboarding</text>

    <line x1="280" y1="180" x2="300" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
    <line x1="480" y1="180" x2="500" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
    <line x1="190" y1="220" x2="290" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
    <line x1="490" y1="220" x2="490" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>