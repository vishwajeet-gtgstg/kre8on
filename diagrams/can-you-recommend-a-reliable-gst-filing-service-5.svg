<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
    <text x="50%" y="50" text-anchor="middle" font-family="Arial" font-size="24" fill="#1f2a44">Reliable GST Filing Service Architecture</text>
    <rect x="50" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="150" y="150" text-anchor="middle" font-family="Arial" font-size="16" fill="#1f2a44">User Input</text>

    <rect x="300" y="80" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-2 400 130)" />
    <text x="400" y="130" text-anchor="middle" font-family="Arial" font-size="16" fill="#1f2a44">Service Selection</text>

    <rect x="550" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="650" y="150" text-anchor="middle" font-family="Arial" font-size="16" fill="#1f2a44">Document Submission</text>

    <rect x="300" y="260" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-2 400 310)" />
    <text x="400" y="310" text-anchor="middle" font-family="Arial" font-size="16" fill="#1f2a44">GST Processing</text>

    <rect x="50" y="260" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="150" y="310" text-anchor="middle" font-family="Arial" font-size="16" fill="#1f2a44">Filing Confirmation</text>

    <line x1="250" y1="150" x2="300" y2="130" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
    <line x1="500" y1="150" x2="550" y2="130" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
    <line x1="400" y1="180" x2="400" y2="260" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
    <line x1="150" y1="180" x2="150" y2="260" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
</svg>