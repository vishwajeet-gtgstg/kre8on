<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-size="24" font-family="sans-serif" fill="#1f2a44">Citation Tracking for AI Answer Engines</text>
  
  <rect x="50" y="100" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="125" y="140" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#1f2a44">Citations Providers</text>

  <rect x="250" y="60" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-3 250 100)" />
  <text x="350" y="100" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#1f2a44">AI Answer Engines</text>

  <rect x="500" y="100" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="575" y="140" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#1f2a44">Analytics Tools</text>

  <rect x="50" y="300" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="125" y="340" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#1f2a44">Research Organizations</text>

  <rect x="250" y="300" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="325" y="340" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#1f2a44">Data Aggregators</text>

  <line x1="200" y1="140" x2="250" y2="100" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="140" x2="500" y2="140" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="320" x2="150" y2="280" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="320" x2="325" y2="320" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="80" x2="250" y2="140" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>