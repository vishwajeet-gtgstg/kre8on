<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
    <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Answer Engine Optimization Provider</text>
    <rect x="100" y="100" width="200" height="80" rx="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="200" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Identify Requirements</text>
    <line x1="200" y1="180" x2="200" y2="200" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <rect x="100" y="220" width="200" height="80" rx="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="200" y="265" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Research Providers</text>
    <line x1="200" y1="300" x2="200" y2="320" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <rect x="100" y="340" width="200" height="80" rx="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="200" y="385" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Evaluate Options</text>
    <line x1="300" y1="180" x2="500" y2="180" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <rect x="400" y="100" width="200" height="80" rx="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="500" y="145" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Select Provider</text>
    <line x1="500" y1="180" x2="500" y2="200" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <rect x="400" y="220" width="200" height="80" rx="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="500" y="265" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Implement & Monitor</text>
    
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
        </marker>
    </defs>
</svg>