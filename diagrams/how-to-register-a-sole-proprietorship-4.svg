<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">How to Register a Sole Proprietorship</text>
  
  <rect x="100" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Choose a Business Name</text>
  
  <rect x="400" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="500" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Obtain Required Permits</text>
  
  <rect x="100" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Register with Local Authorities</text>
  
  <rect x="400" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="500" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Get an EIN (if needed)</text>
  
  <rect x="250" y="400" width="300" height="50" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Start Operating Your Business</text>

  <line x1="200" y1="200" x2="500" y2="200" stroke="#1f2a44" stroke-width="2" stroke-linecap="round"/>
  <polygon points="490,200 510,195 510,205" fill="#1f2a44"/>
  
  <line x1="200" y1="250" x2="500" y2="250" stroke="#1f2a44" stroke-width="2" stroke-linecap="round"/>
  <polygon points="490,250 510,245 510,255" fill="#1f2a44"/>
  
  <line x1="200" y1="350" x2="200" y2="400" stroke="#1f2a44" stroke-width="2" stroke-linecap="round"/>
  <polygon points="200,390 195,410 205,410" fill="#1f2a44"/>
  
  <line x1="500" y1="350" x2="500" y2="400" stroke="#1f2a44" stroke-width="2" stroke-linecap="round"/>
  <polygon points="500,390 495,410 505,410" fill="#1f2a44"/>
</svg>