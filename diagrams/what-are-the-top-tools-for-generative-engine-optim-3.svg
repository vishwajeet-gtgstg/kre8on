<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Top Tools for Generative Engine Optimization (GEO)</text>
  
  <rect x="100" y="100" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3"></rect>
  <text x="180" y="140" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Tool A</text>
  
  <rect x="300" y="100" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3" transform="rotate(-2 300 100)"></rect>
  <text x="380" y="140" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Tool B</text>
  
  <rect x="500" y="100" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3"></rect>
  <text x="580" y="140" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Tool C</text>
  
  <rect x="200" y="300" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3" transform="rotate(-1 200 300)"></rect>
  <text x="280" y="340" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Tool D</text>
  
  <rect x="400" y="300" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3" transform="rotate(1 400 300)"></rect>
  <text x="480" y="340" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Tool E</text>
  
  <line x1="260" y1="180" x2="300" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"></line>
  <line x1="460" y1="180" x2="500" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"></line>
  <line x1="180" y1="240" x2="200" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"></line>
  <line x1="380" y1="240" x2="400" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"></line>
  <line x1="400" y1="240" x2="480" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"></line>
</svg>