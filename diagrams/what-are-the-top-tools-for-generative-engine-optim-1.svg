<svg viewBox="0 0 800 480">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="480" fill="#faf8f2"/>

  <!-- Global stroke style and text styles -->
  <defs>
    <style>
      .marker-stroke {
        stroke: #1f2a44;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none; /* For boxes and paths */
      }
      .marker-text {
        font-family: sans-serif;
        font-size: 18px;
        fill: #1f2a44;
        text-anchor: middle;
      }
      .title-text {
        font-family: sans-serif;
        font-size: 28px;
        font-weight: bold;
        fill: #1f2a44;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="50" class="title-text">Top Tools for Generative Engine Optimization (GEO)</text>

  <!-- Box 1: Generative AI Platforms -->
  <g transform="translate(100, 180) rotate(-2)">
    <rect x="0" y="0" width="160" height="90" rx="15" ry="15" class="marker-stroke"/>
    <text x="80" y="40" class="marker-text">Generative AI</text>
    <text x="80" y="65" class="marker-text">Platforms</text>
  </g>

  <!-- Box 2: SEO Research Tools -->
  <g transform="translate(280, 175) rotate(1)">
    <rect x="0" y="0" width="160" height="90" rx="15" ry="15" class="marker-stroke"/>
    <text x="80" y="40" class="marker-text">SEO Research</text>
    <text x="80" y="65" class="marker-text">Tools</text>
  </g>

  <!-- Box 3: Content Optimization Suites -->
  <g transform="translate(460, 180) rotate(-1)">
    <rect x="0" y="0" width="160" height="90" rx="15" ry="15" class="marker-stroke"/>
    <text x="80" y="40" class="marker-text">Content</text>
    <text x="80" y="65" class="marker-text">Optimization Suites</text>
  </g>

  <!-- Box 4: Performance Analytics -->
  <g transform="translate(640, 175) rotate(2)">
    <rect x="0" y="0" width="160" height="90" rx="15" ry="15" class="marker-stroke"/>
    <text x="80" y="40" class="marker-text">Performance</text>
    <text x="80" y="65" class="marker-text">Analytics</text>
  </g>

  <!-- Arrows -->
  <!-- Arrow 1 (Box 1 to Box 2) - approximate center-right of Box 1 to center-left of Box 2 -->
  <path d="M 260 225 L 270 223 L 280 220" class="marker-stroke"/>
  <path d="M 280 220 L 273 216 M 280 220 L 273 224" class="marker-stroke"/> <!-- Arrowhead -->

  <!-- Arrow 2 (Box 2 to Box 3) -->
  <path d="M 440 220 L 450 222 L 460 225" class="marker-stroke"/>
  <path d="M 460 225 L 453 221 M 460 225 L 453 229" class="marker-stroke"/> <!-- Arrowhead -->

  <!-- Arrow 3 (Box 3 to Box 4) -->
  <path d="M 620 225 L 630 223 L 640 220" class="marker-stroke"/>
  <path d="M 640 220 L 633 216 M 640 220 L 633 224" class="marker-stroke"/> <!-- Arrowhead -->

  <!-- Feedback Loop: Performance Analytics back to Generative AI Platforms -->
  <!-- From bottom-center of Box 4, down, left, up to bottom-center of Box 1 -->
  <path d="M 720 265 V 360 H 180 V 265" class="marker-stroke"/>
  <path d="M 180 265 L 175 258 M 180 265 L 185 258" class="marker-stroke"/> <!-- Arrowhead pointing up -->
</svg>