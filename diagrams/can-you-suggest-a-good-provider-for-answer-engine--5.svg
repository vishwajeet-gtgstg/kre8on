<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="background-color: #faf8f2;">
  <text x="50%" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Answer Engine Optimization Provider</text>
  
  <rect x="100" y="80" width="180" height="80" fill="none" stroke="#1f2a44" stroke-width="3" rx="15" transform="rotate(-1 190 120)"/>
  <text x="190" y="120" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Research Needs</text>
  
  <rect x="350" y="80" width="180" height="80" fill="none" stroke="#1f2a44" stroke-width="3" rx="15" transform="rotate(-1 440 120)"/>
  <text x="440" y="120" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Identify Providers</text>
  
  <rect x="100" y="220" width="180" height="80" fill="none" stroke="#1f2a44" stroke-width="3" rx="15" transform="rotate(-1 190 260)"/>
  <text x="190" y="260" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Evaluate Features</text>
  
  <rect x="350" y="220" width="180" height="80" fill="none" stroke="#1f2a44" stroke-width="3" rx="15" transform="rotate(-1 440 260)"/>
  <text x="440" y="260" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Price Comparison</text>
  
  <rect x="600" y="220" width="180" height="80" fill="none" stroke="#1f2a44" stroke-width="3" rx="15" transform="rotate(-1 690 260)"/>
  <text x="690" y="260" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Make Decision</text>

  <line x1="180" y1="160" x2="350" y2="160" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="220" x2="190" y2="160" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="160" x2="440" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="300" x2="440" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="300" x2="690" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
    </marker>
  </defs>
</svg>