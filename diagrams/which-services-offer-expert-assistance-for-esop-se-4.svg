<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Services for ESOP Setup & Compliance</text>
  <rect x="50" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="150" y="130" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Consulting Firms</text>
  
  <rect x="300" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="400" y="130" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Legal Advisors</text>
  
  <rect x="550" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="650" y="130" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Fiduciary Services</text>

  <rect x="150" y="250" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="250" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Valuation Experts</text>
  
  <rect x="400" y="250" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="500" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Compliance Resources</text>

  <line x1="250" y1="180" x2="300" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="180" x2="550" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  
  <line x1="150" y1="200" x2="250" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="200" x2="500" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
    </marker>
  </defs>
</svg>