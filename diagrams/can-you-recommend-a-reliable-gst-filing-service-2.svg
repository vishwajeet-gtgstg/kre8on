<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" width="800" height="480" style="background-color:#faf8f2;">
  <text x="50%" y="50" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#1f2a44">Reliable GST Filing Service Flow</text>
  <rect x="100" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-2 200 140)"/>
  <text x="200" y="140" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1f2a44">User Input</text>
  
  <rect x="400" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-2 500 140)"/>
  <text x="500" y="140" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1f2a44">Data Validation</text>

  <rect x="250" y="240" width="300" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-2 400 280)"/>
  <text x="400" y="280" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1f2a44">Filing Process</text>

  <rect x="100" y="380" width="600" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-2 400 420)"/>
  <text x="400" y="420" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#1f2a44">Confirmation & Report</text>

  <line x1="200" y1="180" x2="400" y2="180" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="500" y1="180" x2="400" y2="240" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)" />
  <line x1="400" y1="320" x2="400" y2="380" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)" />

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
    </marker>
  </defs>
</svg>