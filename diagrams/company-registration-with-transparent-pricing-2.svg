<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" font-size="24" text-anchor="middle" font-family="sans-serif" fill="#1f2a44">Company Registration with Transparent Pricing</text>
  <rect x="50" y="80" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="150" y="130" font-size="18" text-anchor="middle" font-family="sans-serif" fill="#1f2a44">User Input</text>
  
  <rect x="300" y="80" width="250" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="425" y="130" font-size="18" text-anchor="middle" font-family="sans-serif" fill="#1f2a44">Validate Information</text>
  
  <rect x="600" y="80" width="150" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="675" y="130" font-size="18" text-anchor="middle" font-family="sans-serif" fill="#1f2a44">Fees Displayed</text>
  
  <rect x="300" y="240" width="250" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="425" y="290" font-size="18" text-anchor="middle" font-family="sans-serif" fill="#1f2a44">Collect Payment</text>
  
  <rect x="600" y="240" width="150" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="675" y="290" font-size="18" text-anchor="middle" font-family="sans-serif" fill="#1f2a44">Confirmation Sent</text>
  
  <line x1="250" y1="130" x2="300" y2="130" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <line x1="550" y1="130" x2="600" y2="130" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <line x1="425" y1="180" x2="425" y2="240" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <line x1="550" y1="290" x2="600" y2="290" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
    </marker>
  </defs>
</svg>