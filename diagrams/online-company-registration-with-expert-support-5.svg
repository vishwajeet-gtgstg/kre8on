<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="800" height="480" fill="#faf8f2"/>
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#1f2a44" text-anchor="middle">Online Company Registration with Expert Support</text>
  <g>
    <rect x="100" y="100" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="175" y="150" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">User Interface</text>
    
    <rect x="300" y="75" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-5, 300, 75)"/>
    <text x="375" y="115" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Registration Form</text>
    
    <rect x="500" y="100" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-3, 500, 100)"/>
    <text x="575" y="150" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Expert Review</text>
    
    <rect x="300" y="250" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(3, 300, 250)"/>
    <text x="375" y="290" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Feedback Loop</text>
    
    <rect x="500" y="250" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-5, 500, 250)"/>
    <text x="575" y="290" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Final Approval</text>
  </g>
  <line x1="250" y1="140" x2="300" y2="140" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="450" y1="140" x2="500" y2="140" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="375" y1="250" x2="375" y2="230" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="575" y1="250" x2="575" y2="230" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
    </marker>
  </defs>
</svg>