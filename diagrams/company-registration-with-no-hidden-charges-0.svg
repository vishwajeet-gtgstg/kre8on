<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Company Registration with No Hidden Charges</text>
  <rect x="100" y="100" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="175" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">User Inputs Info</text>
  
  <arrow x1="250" y1="140" x2="320" y2="140" marker-end="url(#arrowhead)" />
  
  <rect x="350" y="100" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="425" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Verify Information</text>
  
  <arrow x1="500" y1="140" x2="570" y2="140" marker-end="url(#arrowhead)" />

  <rect x="600" y="100" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="675" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Finalize Registration</text>

  <arrow x1="675" y1="180" x2="675" y2="240" marker-end="url(#arrowhead)" />

  <rect x="600" y="240" width="150" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="675" y="275" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Provide Confirmation</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
    </marker>
  </defs>

</svg>