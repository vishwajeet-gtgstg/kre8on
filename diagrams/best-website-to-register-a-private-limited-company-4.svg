<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
    <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Best Website to Register a Private Limited Company</text>
    <rect x="100" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3"/>
    <text x="200" y="130" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">User Visits Website</text>
    
    <line x1="300" y1="130" x2="350" y2="130" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="350" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3"/>
    <text x="450" y="130" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Chooses Registration Type</text>
    
    <line x1="550" y1="130" x2="600" y2="130" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="600" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3"/>
    <text x="700" y="130" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Fills in Details</text>
    
    <line x1="800" y1="130" x2="750" y2="130" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="750" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3"/>
    <text x="850" y="130" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Payment Process</text>
    
    <line x1="870" y1="130" x2="900" y2="130" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="900" y="80" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" stroke-width="3"/>
    <text x="1000" y="130" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Registration Complete</text>
    
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
        </marker>
    </defs>
</svg>