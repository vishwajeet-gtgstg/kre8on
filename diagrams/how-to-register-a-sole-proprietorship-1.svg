<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-size="24" fill="#1f2a44" font-family="sans-serif">How to Register a Sole Proprietorship</text>
  <rect x="50" y="80" width="200" height="100" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="150" y="130" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Choose a Business Name</text>
  
  <rect x="300" y="80" width="200" height="100" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="130" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Register the Name</text>
  
  <rect x="550" y="80" width="200" height="100" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="650" y="130" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Obtain Licenses/Permits</text>
  
  <rect x="150" y="250" width="200" height="100" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="250" y="300" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Open a Business Bank Account</text>
  
  <rect x="400" y="250" width="200" height="100" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="500" y="300" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">File for Taxes</text>
  
  <path d="M250 180 L300 180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <path d="M500 180 L550 180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <path d="M250 250 L300 250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <path d="M500 250 L550 250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <path d="M400 180 L400 250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <path d="M650 180 L650 250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>