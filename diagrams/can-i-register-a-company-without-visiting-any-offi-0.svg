<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" font-family=" sans-serif" font-size="24" fill="#1f2a44" text-anchor="middle">Can I Register a Company Online?</text>
  
  <g>
    <rect x="50" y="80" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="150" y="130" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Visit Website</text>
  </g>
  
  <g>
    <rect x="300" y="80" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="400" y="130" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Submit Application</text>
  </g>
  
  <g>
    <rect x="550" y="80" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="650" y="130" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Pay Fees</text>
  </g>
  
  <g>
    <rect x="190" y="240" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="290" y="290" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Receive Confirmation</text>
  </g>
  
  <g>
    <rect x="440" y="240" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="540" y="290" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Access Documents</text>
  </g>
  
  <line x1="250" y1="180" x2="300" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="500" y1="180" x2="550" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="300" y1="180" x2="290" y2="240" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
  <line x1="550" y1="180" x2="540" y2="240" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
</svg>