<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="50%" y="50" text-anchor="middle" font-size="24" fill="#1f2a44" font-family="sans-serif">Which Company Registration Service Has the Best Reviews?</text>
  <rect x="50" y="100" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"></rect>
  <text x="150" y="140" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Research Services</text>
  
  <rect x="300" y="100" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"></rect>
  <text x="400" y="140" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Collect Reviews</text>
  
  <rect x="550" y="100" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"></rect>
  <text x="650" y="140" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Analyze Data</text>
  
  <rect x="150" y="250" width="500" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"></rect>
  <text x="400" y="290" text-anchor="middle" font-size="16" fill="#1f2a44" font-family="sans-serif">Determine Best Service</text>
  
  <line x1="250" y1="140" x2="300" y2="140" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"></line>
  <line x1="500" y1="140" x2="550" y2="140" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"></line>
  
  <line x1="400" y1="180" x2="400" y2="250" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"></line>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
    </marker>
  </defs>
</svg>