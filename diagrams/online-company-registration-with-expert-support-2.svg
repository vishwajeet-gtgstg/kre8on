<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
    <text x="50%" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Online Company Registration with Expert Support</text>
    <rect x="100" y="80" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="transparent" stroke-width="3"/>
    <text x="180" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">User Interface</text>
    
    <rect x="300" y="80" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="transparent" stroke-width="3"/>
    <text x="380" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Registration Form</text>
    
    <rect x="500" y="80" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="transparent" stroke-width="3"/>
    <text x="580" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Database</text>
    
    <rect x="300" y="220" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="transparent" stroke-width="3"/>
    <text x="380" y="260" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Expert Support</text>
    
    <rect x="500" y="220" width="160" height="80" rx="15" ry="15" stroke="#1f2a44" fill="transparent" stroke-width="3"/>
    <text x="580" y="260" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Feedback Loop</text>

    <line x1="260" y1="120" x2="300" y2="120" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <line x1="460" y1="120" x2="500" y2="120" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <line x1="380" y1="160" x2="380" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <line x1="580" y1="160" x2="580" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
        </marker>
    </defs>
</svg>