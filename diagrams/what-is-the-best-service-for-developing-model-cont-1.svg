  <rect x="100" y="100" width="150" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="175" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Service A</text>
  
  <rect x="300" y="100" width="150" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="375" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Service B</text>
  
  <rect x="500" y="100" width="150" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="575" y="145" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Service C</text>
  
  <rect x="200" y="250" width="400" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
