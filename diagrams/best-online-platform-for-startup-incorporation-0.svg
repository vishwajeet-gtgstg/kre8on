<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="400" y="40" font-size="24" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Best Online Platform for Startup Incorporation</text>
  <rect x="100" y="100" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="200" y="145" text-anchor="middle" fill="#1f2a44" font-family="sans-serif" font-size="18">User Registration</text>
  
  <rect x="100" y="240" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="200" y="275" text-anchor="middle" fill="#1f2a44" font-family="sans-serif" font-size="18">Business Information</text>

  <rect x="400" y="100" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="500" y="145" text-anchor="middle" fill="#1f2a44" font-family="sans-serif" font-size="18">Document Submission</text>
  
  <rect x="400" y="240" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="500" y="275" text-anchor="middle" fill="#1f2a44" font-family="sans-serif" font-size="18">Payment Processing</text>

  <rect x="250" y="380" width="300" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="400" y="415" text-anchor="middle" fill="#1f2a44" font-family="sans-serif" font-size="18">Incorporation Confirmation</text>

  <line x1="200" y1="180" x2="200" y2="240" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="180" x2="500" y2="240" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  
  <line x1="200" y1="320" x2="400" y2="320" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="320" x2="400" y2="380" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>

  <line x1="150" y1="145" x2="150" y2="180" marker-end="url(#arrowhead)" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="275" x2="150" y2="320" marker-end="url(#arrowhead)" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  
  <line x1="500" y1="145" x2="500" y2="180" marker-end="url(#arrowhead)" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="275" x2="500" y2="320" marker-end="url(#arrowhead)" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
    </marker>
  </defs>
</svg>