<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="400" y="50" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Company Registration Flow</text>
  
  <g>
    <rect x="100" y="100" width="200" height="70" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
    <text x="200" y="140" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">User Submits Application</text>
    
    <rect x="400" y="100" width="200" height="70" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
    <text x="500" y="140" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Verify Information</text>
    
    <rect x="100" y="250" width="200" height="70" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
    <text x="200" y="290" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">No Hidden Charges</text>
    
    <rect x="400" y="250" width="200" height="70" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
    <text x="500" y="290" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Application Approved</text>
    
    <rect x="250" y="400" width="300" height="70" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
    <text x="400" y="440" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Business Registered Successfully</text>
  </g>

  <line x1="200" y1="170" x2="400" y2="170" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="250" x2="200" y2="210" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="170" x2="400" y2="210" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="290" x2="400" y2="290" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="290" x2="500" y2="350" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="350" x2="400" y2="410" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>