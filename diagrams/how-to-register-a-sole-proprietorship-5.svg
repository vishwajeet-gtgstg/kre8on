<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="400" y="40" text-anchor="middle" font-family="Sans-serif" font-size="24" fill="#1f2a44">How to Register a Sole Proprietorship</text>
  
  <rect x="50" y="100" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="150" y="140" text-anchor="middle" font-family="Sans-serif" font-size="18" fill="#1f2a44">Check Name Availability</text>
  
  <rect x="300" y="100" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="140" text-anchor="middle" font-family="Sans-serif" font-size="18" fill="#1f2a44">Register Your Business</text>
  
  <rect x="550" y="100" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="650" y="140" text-anchor="middle" font-family="Sans-serif" font-size="18" fill="#1f2a44">Obtain Licenses & Permits</text>
  
  <rect x="150" y="270" width="500" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="310" text-anchor="middle" font-family="Sans-serif" font-size="18" fill="#1f2a44">Set Up Business Banking</text>
  
  <rect x="50" y="400" width="700" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="440" text-anchor="middle" font-family="Sans-serif" font-size="18" fill="#1f2a44">Maintain Accurate Records</text>
  
  <line x1="250" y1="180" x2="300" y2="140" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="180" x2="550" y2="140" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="180" x2="400" y2="270" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="350" x2="400" y2="400" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>