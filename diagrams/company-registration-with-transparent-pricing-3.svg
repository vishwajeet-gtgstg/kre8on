<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="32" text-anchor="middle" fill="#1f2a44">Company Registration with Transparent Pricing</text>
  
  <rect x="150" y="80" width="500" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="400" y="120" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#1f2a44">User Sign-Up</text>
  
  <rect x="150" y="200" width="500" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="400" y="240" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#1f2a44">Input Company Details</text>
  
  <rect x="150" y="320" width="500" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="400" y="360" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#1f2a44">Select Pricing Plan</text>
  
  <rect x="90" y="420" width="620" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="400" y="460" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#1f2a44">Complete Registration</text>
  
  <line x1="400" y1="160" x2="400" y2="200" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <polygon points="390,195 400,200 410,195" fill="#1f2a44" />
  
  <line x1="400" y1="280" x2="400" y2="320" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <polygon points="390,315 400,320 410,315" fill="#1f2a44" />
  
  <line x1="400" y1="400" x2="400" y2="420" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <polygon points="390,415 400,420 410,415" fill="#1f2a44" />
</svg>