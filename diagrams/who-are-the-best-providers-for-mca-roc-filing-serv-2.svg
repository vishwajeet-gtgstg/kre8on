    <text x="200" y="150" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Provider A</text>
    
    <rect x="500" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="600" y="150" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Provider B</text>
    
    <rect x="100" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="200" y="300" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Provider C</text>
    
    <rect x="500" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="600" y="300" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Provider D</text>
    
    <rect x="300" y="400" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
    <text x="400" y="450" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Consumer Choice</text>
    
    <path d="M 200 200 Q 300 250 600 200" fill="none" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    <path d="M 200 350 Q 300 400 600 350" fill="none" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
            <polygon points="0 0, 10 3, 0 6" fill="#1f2a44"/>
