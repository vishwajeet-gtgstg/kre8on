<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="50%" y="50" font-size="24" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Measuring AI Answer Visibility</text>
  <rect x="50" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="150" y="150" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Data Sources</text>
  
  <rect x="300" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="150" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">AI Responses</text>
  
  <rect x="550" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="650" y="150" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Visibility Metrics</text>
  
  <rect x="150" y="250" width="500" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="300" font-size="16" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Analysis & Reporting</text>

  <line x1="250" y1="140" x2="300" y2="140" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="140" x2="550" y2="140" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="180" x2="400" y2="250" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
    </marker>
  </defs>
</svg>