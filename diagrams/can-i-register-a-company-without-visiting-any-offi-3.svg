<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Can I register a company without visiting any office?</text>
  
  <g>
    <rect x="100" y="100" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" />
    <text x="200" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Online Registration Portal</text>
    
    <line x1="300" y1="150" x2="350" y2="150" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
    <polygon points="350,145 360,150 350,155" fill="#1f2a44" />
    
    <rect x="360" y="100" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" />
    <text x="460" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Identity Verification</text>
    
    <line x1="560" y1="150" x2="600" y2="150" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
    <polygon points="600,145 610,150 600,155" fill="#1f2a44" />
    
    <rect x="610" y="100" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" />
    <text x="710" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Approval Process</text>
    
    <line x1="300" y1="230" x2="350" y2="230" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
    <polygon points="350,225 360,230 350,235" fill="#1f2a44" />
    
    <rect x="360" y="230" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" />
    <text x="460" y="280" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Receive Registration Certificate</text>
    
    <line x1="560" y1="280" x2="600" y2="280" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
    <polygon points="600,275 610,280 600,285" fill="#1f2a44" />
    
    <rect x="610" y="230" width="200" height="100" rx="15" ry="15" stroke="#1f2a44" fill="none" />
    <text x="710" y="280" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Company Registered!</text>
  </g>
</svg>