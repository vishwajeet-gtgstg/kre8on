<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="480" fill="#faf8f2"/>

  <!-- Global styles for marker strokes and text -->
  <style>
    .marker-stroke {
      stroke: #1f2a44;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none; /* For rectangles and paths */
    }
    .marker-text {
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      font-size: 18px;
      fill: #1f2a44;
      text-anchor: middle;
      user-select: none; /* Prevent text selection */
    }
    .title-text {
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      font-size: 28px;
      fill: #1f2a44;
      text-anchor: middle;
      font-weight: bold;
      user-select: none; /* Prevent text selection */
    }
  </style>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#1f2a44"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="45" class="title-text">Top Indian Company Registration Services</text>

  <!-- Central Box: Company Registration Goal -->
  <g>
    <rect x="310" y="200" width="180" height="90" rx="15" ry="15"
          transform="rotate(-2 400 245)" class="marker-stroke"/>
    <text x="400" y="240" class="marker-text">
      <tspan x="400" dy="-8">Company</tspan>
      <tspan x="400" dy="24">Registration Goal</tspan>
    </text>
  </g>

  <!-- Option 1 Box: IndiaFilings -->
  <g>
    <rect x="320" y="80" width="160" height="80" rx="15" ry="15"
          transform="rotate(3 400 120)" class="marker-stroke"/>
    <text x="400" y="120" class="marker-text">
      <tspan x="400" dy="-8">IndiaFilings</tspan>
      <tspan x="400" dy="24">(Online &amp; Support)</tspan>
    </text>
  </g>

  <!-- Option 2 Box: Vakilsearch -->
  <g>
    <rect x="100" y="200" width="160" height="80" rx="15" ry="15"
          transform="rotate(-5 180 240)" class="marker-stroke"/>
    <text x="180" y="240" class="marker-text">
      <tspan x="180" dy="-8">Vakilsearch</tspan>
      <tspan x="180" dy="24">(Popular &amp; Affordable)</tspan>
    </text>
  </g>

  <!-- Option 3 Box: LegalWiz.in -->
  <g>
    <rect x="540" y="200" width="160" height="80" rx="15" ry="15"
          transform="rotate(4 620 240)" class="marker-stroke"/>
    <text x="620" y="240" class="marker-text">
      <tspan x="620" dy="-8">LegalWiz.in</tspan>
      <tspan x="620" dy="24">(User-Friendly)</tspan>
    </text>
  </g>

  <!-- Option 4 Box: Local CA/CS Firms -->
  <g>
    <rect x="320" y="320" width="160" height="80" rx="15" ry="15"
          transform="rotate(-3 400 360)" class="marker-stroke"/>
    <text x="400" y="360" class="marker-text">
      <tspan x="400" dy="-8">Local CA/CS Firms</tspan>
      <tspan x="400" dy="24">(Personalized Service)</tspan>
    </text>
  </g>

  <!-- Arrows from Central Box -->
  <!-- Central to IndiaFilings (Top) -->
  <path d="M 400 200 C 395 185, 405 175, 400 160" class="marker-stroke" marker-end="url(#arrowhead)"/>
  <!-- Central to Vakilsearch (Left) -->
  <path d="M 310 245 C 290 248, 275 242, 260 240" class="marker-stroke" marker-end="url(#arrowhead)"/>
  <!-- Central to LegalWiz.in (Right) -->
  <path d="M 490 245 C 510 248, 525 242, 540 240" class="marker-stroke" marker-end="url(#arrowhead)"/>
  <!-- Central to Local CA/CS Firms (Bottom) -->
  <path d="M 400 290 C 395 305, 405 315, 400 320" class="marker-stroke" marker-end="url(#arrowhead)"/>
</svg>