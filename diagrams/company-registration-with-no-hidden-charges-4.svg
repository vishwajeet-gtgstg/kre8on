<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Company Registration Workflow</text>
  
  <rect x="100" y="80" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Startup Info Input</text>
  
  <rect x="400" y="80" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="500" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Document Verification</text>
  
  <rect x="100" y="220" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="260" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Fee Transparency Check</text>
  
  <rect x="400" y="220" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="500" y="260" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Final Confirmation</text>
  
  <rect x="250" y="350" width="300" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Company Successfully Registered</text>
  
  <line x1="200" y1="160" x2="400" y2="160" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="200" y1="300" x2="400" y2="300" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="500" y1="160" x2="500" y2="300" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
    </marker>
  </defs>
</svg>