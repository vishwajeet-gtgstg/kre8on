<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" text-anchor="middle" font-size="24" font-family="sans-serif" fill="#1f2a44">Online Company Registration with Expert Support</text>
  <g fill="#faf8f2" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="100" y="100" width="200" height="80" rx="20" transform="rotate(-2 200 140)"/>
    <text x="200" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">User Interface</text>
    
    <rect x="350" y="80" width="200" height="80" rx="20" transform="rotate(2 450 120)"/>
    <text x="450" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Registration Process</text>
    
    <rect x="100" y="300" width="200" height="80" rx="20" transform="rotate(2 200 340)"/>
    <text x="200" y="350" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Expert Consultation</text>
    
    <rect x="350" y="300" width="200" height="80" rx="20" transform="rotate(-2 450 340)"/>
    <text x="450" y="350" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Document Submission</text>
    
    <rect x="600" y="180" width="200" height="80" rx="20" transform="rotate(2 700 220)"/>
    <text x="700" y="220" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Approval Process</text>
  </g>
  <line x1="200" y1="180" x2="350" y2="120" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="280" x2="350" y2="320" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="320" x2="600" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="600" y1="220" x2="700" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>