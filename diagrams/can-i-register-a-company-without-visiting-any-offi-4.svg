<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Can I Register a Company Without Visiting Any Office?</text>
  
  <rect x="100" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Start Online Process</text>
  
  <rect x="350" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="450" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Choose Company Structure</text>

  <rect x="600" y="100" width="150" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="675" y="150" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Fill Application Form</text>
  
  <rect x="250" y="250" width="300" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="300" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Submit Documents Online</text>
  
  <rect x="500" y="250" width="150" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="575" y="300" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Receive Confirmation</text>
  
  <line x1="300" y1="150" x2="350" y2="150" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <polygon points="350,145 350,155 360,150" fill="#1f2a44"/>
  
  <line x1="550" y1="150" x2="600" y2="150" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <polygon points="600,145 600,155 610,150" fill="#1f2a44"/>

  <line x1="400" y1="200" x2="400" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <polygon points="395,250 405,250 400,260" fill="#1f2a44"/>
  
  <line x1="650" y1="200" x2="650" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <polygon points="645,250 655,250 650,260" fill="#1f2a44"/>
</svg>