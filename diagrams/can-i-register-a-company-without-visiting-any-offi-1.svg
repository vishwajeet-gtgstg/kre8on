<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" fill="#1f2a44" text-anchor="middle">Register a Company Online</text>
  
  <rect x="100" y="100" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="145" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Visit Registration Site</text>
  
  <rect x="300" y="230" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="265" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Fill Out Application</text>
  
  <rect x="100" y="230" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="265" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Prepare Documents</text>
  
  <rect x="550" y="100" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="650" y="145" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Submit Online</text>
  
  <rect x="300" y="350" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="385" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Receive Confirmation</text>
  
  <line x1="200" y1="180" x2="200" y2="230" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="180" x2="400" y2="230" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="265" x2="400" y2="265" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="265" x2="650" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="350" x2="400" y2="265" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="650" y1="145" x2="650" y2="180" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="650" y1="180" x2="650" y2="350" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>