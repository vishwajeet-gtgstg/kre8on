<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
    <text x="50%" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">AI Answer Visibility Measurement Tool</text>
    <rect x="100" y="100" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="200" y="140" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Data Sources</text>
    
    <rect x="450" y="80" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="550" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Measurement Metrics</text>

    <rect x="100" y="300" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="200" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Analysis Engine</text>

    <rect x="450" y="300" width="200" height="80" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
    <text x="550" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Visualization Dashboard</text>

    <path d="M 200 180 C 250 220, 350 220, 400 180" fill="none" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    <path d="M 200 380 C 250 320, 350 320, 400 380" fill="none" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>
    <path d="M 400 140 L 450 140" fill="none" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrowhead)"/>

    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
        </marker>
    </defs>
</svg>