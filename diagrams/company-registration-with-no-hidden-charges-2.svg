<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="40" font-family="sans-serif" font-size="24" fill="#1f2a44" text-anchor="middle">Company Registration Flow</text>
  
  <rect x="50" y="80" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="150" y="120" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">User Submits Info</text>
  
  <rect x="300" y="80" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="400" y="120" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Verify Information</text>
  
  <rect x="550" y="80" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="650" y="120" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Create Company Account</text>
  
  <rect x="300" y="220" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="400" y="260" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">No Hidden Charges</text>
  
  <rect x="50" y="220" width="200" height="80" rx="15" ry="15" stroke="#1f2a44" stroke-width="3" fill="none"/>
  <text x="150" y="260" font-family="sans-serif" font-size="16" fill="#1f2a44" text-anchor="middle">Register Company</text>

  <line x1="150" y1="160" x2="150" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="160" x2="400" y2="220" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="160" x2="650" y2="160" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
</svg>