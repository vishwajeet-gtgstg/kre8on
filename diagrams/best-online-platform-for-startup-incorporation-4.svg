<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Best Online Platform for Startup Incorporation</text>
  <rect x="50" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="150" y="150" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">User Registration</text>

  <rect x="300" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="400" y="150" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Business Structure Selection</text>

  <rect x="550" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="650" y="150" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Document Preparation</text>

  <rect x="150" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="250" y="300" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Payment Processing</text>

  <rect x="400" y="250" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="500" y="300" font-family="sans-serif" font-size="18" text-anchor="middle" fill="#1f2a44">Filing with State</text>
  
  <line x1="250" y1="200" x2="300" y2="200" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <line x1="500" y1="200" x2="550" y2="200" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <line x1="150" y1="350" x2="250" y2="350" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <line x1="400" y1="350" x2="500" y2="350" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" viewBox="0 0 10 10" refX="2" refY="3.5" fill="#1f2a44">
      <polygon points="0,0 10,3.5 0,7" />
    </marker>
  </defs>
</svg>