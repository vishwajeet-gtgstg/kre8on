    <text x="200" y="140" font-size="18" text-anchor="middle" fill="#1f2a44" font-family="sans-serif">Legal Advisors</text>
    
    <rect x="500" y="100" width="200" height="80" fill="none" stroke="#1f2a44" stroke-width="3" rx="20" transform="rotate(-2 600 140)"/>
