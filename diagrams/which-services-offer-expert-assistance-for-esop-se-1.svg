  <line x1="600" y1="250" x2="600" y2="400" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  
  <line x1="300" y1="100" x2="300" y2="250" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
