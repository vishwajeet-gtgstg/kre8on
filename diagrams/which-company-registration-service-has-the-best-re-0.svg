  <text x="400" y="350" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Identify Best Service</text>
  
  <rect x="550" y="300" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="650" y="350" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">User Experience</text>
  
  <line x1="200" y1="150" x2="300" y2="130" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="130" x2="550" y2="150" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="200" x2="400" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="200" x2="500" y2="300" stroke="#1f2a44" stroke-width="3" stroke-linecap="round"/>
