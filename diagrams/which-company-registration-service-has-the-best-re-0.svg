  <rect x="50" y="100" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
  <text x="150" y="150" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Collect Reviews</text>
  
  <rect x="300" y="80" width="200" height="100" rx="15" ry="15" fill="none" stroke="#1f2a44" stroke-width="3"/>
