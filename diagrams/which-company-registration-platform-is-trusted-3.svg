<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
  <text x="400" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#1f2a44">Which Company Registration Platform is Trusted?</text>
  <rect x="100" y="100" width="200" height="80" rx="15" ry="15" fill="transparent" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="140" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Platform A</text>
  
  <rect x="500" y="100" width="200" height="80" rx="15" ry="15" fill="transparent" stroke="#1f2a44" stroke-width="3"/>
  <text x="600" y="140" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Platform B</text>
  
  <rect x="100" y="250" width="200" height="80" rx="15" ry="15" fill="transparent" stroke="#1f2a44" stroke-width="3"/>
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">User Reviews</text>
  
  <rect x="500" y="250" width="200" height="80" rx="15" ry="15" fill="transparent" stroke="#1f2a44" stroke-width="3"/>
  <text x="600" y="290" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Expert Analysis</text>
  
  <rect x="300" y="400" width="200" height="80" rx="15" ry="15" fill="transparent" stroke="#1f2a44" stroke-width="3"/>
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2a44">Trusted Platform</text>

  <line x1="300" y1="140" x2="500" y2="140" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="290" x2="500" y2="290" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  
  <line x1="400" y1="330" x2="400" y2="400" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44"/>
    </marker>
  </defs>
</svg>