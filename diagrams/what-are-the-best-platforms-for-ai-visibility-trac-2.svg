<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color:#faf8f2;">
  <text x="50%" y="50" dominant-baseline="middle" text-anchor="middle" font-size="24" font-family="sans-serif" fill="#1f2a44">Best Platforms for AI Visibility Tracking</text>
  <rect x="100" y="100" width="160" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="180" y="145" font-size="16" font-family="sans-serif" fill="#1f2a44" text-anchor="middle">Data Collection</text>
  
  <rect x="320" y="80" width="160" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-2, 400, 120)" />
  <text x="400" y="145" font-size="16" font-family="sans-serif" fill="#1f2a44" text-anchor="middle">Data Processing</text>
  
  <rect x="540" y="100" width="160" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="620" y="145" font-size="16" font-family="sans-serif" fill="#1f2a44" text-anchor="middle">Metrics Visualization</text>

  <rect x="350" y="240" width="160" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(-1, 430, 280)" />
  <text x="430" y="275" font-size="16" font-family="sans-serif" fill="#1f2a44" text-anchor="middle">AI Model Insights</text>

  <rect x="100" y="260" width="160" height="80" rx="10" fill="none" stroke="#1f2a44" stroke-width="3" />
  <text x="180" y="295" font-size="16" font-family="sans-serif" fill="#1f2a44" text-anchor="middle">User Feedback</text>

  <line x1="260" y1="140" x2="320" y2="120" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="480" y1="140" x2="540" y2="140" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="400" y1="180" x2="400" y2="240" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)" />
  <line x1="180" y1="300" x2="260" y2="300" stroke="#1f2a44" stroke-width="3" marker-end="url(#arrow)" />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
    </marker>
  </defs>
</svg>