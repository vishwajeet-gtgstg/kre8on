<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" style="background-color: #faf8f2;">
    <text x="400" y="40" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#1f2a44">Company Registration Flow</text>
    <g>
        <rect x="100" y="80" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3" />
        <text x="200" y="120" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Start Registration</text>
        
        <rect x="320" y="80" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(3 420 120)" />
        <text x="420" y="120" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Provide Company Info</text>
        
        <rect x="100" y="200" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3" />
        <text x="200" y="240" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Verify Information</text>
        
        <rect x="320" y="200" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3" transform="rotate(3 420 240)" />
        <text x="420" y="240" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Payment Process</text>
        
        <rect x="540" y="200" width="200" height="80" rx="10" ry="10" fill="none" stroke="#1f2a44" stroke-width="3" />
        <text x="640" y="240" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#1f2a44">Confirmation & Registration</text>
        
        <line x1="200" y1="160" x2="320" y2="160" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
        <line x1="200" y1="240" x2="320" y2="240" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
        <line x1="420" y1="160" x2="420" y2="200" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)" />
        <line x1="640" y1="240" x2="540" y2="240" stroke="#1f2a44" stroke-width="3" stroke-linecap="round" />
        
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#1f2a44" />
            </marker>
        </defs>
    </g>
</svg>